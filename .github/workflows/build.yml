name: Build MOD APK

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'New package name'
        required: false
        default: 'com.jaiho.mod'
      app_name:
        description: 'New app name'
        required: false
        default: 'Jaiho Pro'
      apk_url:
        description: 'Direct APK URL (optional, else uses release chunks)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Download APK direct
        if: github.event.inputs.apk_url != ''
        run: |
          curl -L -o original.apk "${{ github.event.inputs.apk_url }}"
          ls -lh original.apk

      - name: Reassemble APK from chunks
        if: github.event.inputs.apk_url == ''
        run: |
          python3 << 'PYEOF'
import requests, json, os

rel = requests.get('https://api.github.com/repos/${{ github.repository }}/releases/tags/v1',
  headers={'Accept': 'application/vnd.github.v3+json'}).json()

assets = rel.get('assets', [])
chunks = sorted([a for a in assets if a['name'].startswith('apk_part_')], key=lambda x: x['name'])

if not chunks:
    # Try full APK
    apk = [a for a in assets if a['name'].endswith('.apk')]
    if apk:
        url = apk[0]['url']
        data = requests.get(url, headers={'Accept': 'application/octet-stream'}).content
        with open('original.apk', 'wb') as f:
            f.write(data)
        print(f'Downloaded full APK: {len(data)} bytes')
    else:
        print('No APK assets found!')
        exit(1)
else:
    total = 0
    for c in chunks:
        data = requests.get(c['url'], headers={'Accept': 'application/octet-stream'}).content
        with open('original.apk', 'ab') as f:
            f.write(data)
        total += len(data)
        print(f'  {c["name"]}: {len(data)} bytes')
    print(f'Total: {total} bytes')

import os
print(f'File size: {os.path.getsize("original.apk")} bytes')
PYEOF
          ls -lh original.apk

      - name: Verify APK
        run: |
          python3 -c "
import zipfile, os
with zipfile.ZipFile('original.apk') as z:
    names = z.namelist()
    print(f'Entries: {len(names)}')
    assert 'AndroidManifest.xml' in names, 'Not a valid APK!'
    assert 'classes.dex' in names, 'Missing classes.dex!'
print('✅ Valid APK')
"

      - name: Build MOD APK
        run: |
          python3 build.py original.apk \
            --package "${{ github.event.inputs.package_name }}" \
            --name "${{ github.event.inputs.app_name }}" \
            -o mod.apk

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: Mod-APK-Signed
          path: mod*.apk
          retention-days: 7
