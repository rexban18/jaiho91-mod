name: Build MOD APK

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'New package name'
        required: false
        default: 'com.jaiho.mod'
      app_name:
        description: 'New app name'
        required: false
        default: 'Jaiho Pro'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Download and reassemble APK
        run: python3 download_apk.py

      - name: Verify APK
        run: python3 -c "
import zipfile
with zipfile.ZipFile('original.apk') as z:
    names = z.namelist()
    print(f'Entries: {len(names)}')
    assert 'AndroidManifest.xml' in names
    assert 'classes.dex' in names
print('OK')
"

      - name: Build MOD
        run: |
          python3 build.py original.apk \
            --package "${{ github.event.inputs.package_name }}" \
            --name "${{ github.event.inputs.app_name }}" \
            -o mod.apk

      - name: Upload
        uses: actions/upload-artifact@v3
        with:
          name: Mod-APK-Signed
          path: mod*.apk
          retention-days: 7
