name: Build MOD APK

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'New package name'
        required: false
        default: 'com.jaiho.mod'
      app_name:
        description: 'New app name'
        required: false
        default: 'Jaiho Pro'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Download original APK from release
        run: |
          python3 -c "
import os, requests
rel = requests.get('https://api.github.com/repos/${{ github.repository }}/releases/tags/v1',
  headers={'Accept': 'application/vnd.github.v3+json', 'Authorization': 'token ${{ secrets.GITHUB_TOKEN }}'}).json()
assets = rel.get('assets', [])
apk = [a for a in assets if a['name'].endswith('.apk')]
if not apk:
  # fallback: use direct download
  import sys
  print('No APK found in release assets')
  sys.exit(1)
url = apk[0]['url']
print(f'Downloading {apk[0][\"name\"]} ({apk[0][\"size\"]} bytes)')
import subprocess
subprocess.run(['curl', '-sL', '-H', 'Accept: application/octet-stream', '-o', 'original.apk', url], check=True)
print(f'Downloaded: {os.path.getsize(\"original.apk\")} bytes')
" 2>&1
          ls -lh original.apk

      - name: Build MOD APK
        run: |
          python3 build.py original.apk \
            --package "${{ github.event.inputs.package_name }}" \
            --name "${{ github.event.inputs.app_name }}" \
            -o mod.apk

      - name: Upload signed APK
        uses: actions/upload-artifact@v3
        with:
          name: Mod-APK-Signed
          path: mod*.apk
          retention-days: 7
