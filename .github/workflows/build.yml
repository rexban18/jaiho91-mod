name: Build MOD APK

on:
  workflow_dispatch:
    inputs:
      apk_url:
        description: 'Original APK download URL'
        required: true
      package_name:
        description: 'New package name'
        required: false
        default: 'com.jaiho.mod'
      app_name:
        description: 'New app name'
        required: false
        default: 'Jaiho Pro'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '11'
      - name: Download APK
        run: |
          curl -L -o original.apk "${{ github.event.inputs.apk_url }}"
          ls -lh original.apk
      - name: Build MOD
        run: |
          python3 build.py original.apk \
            --package "${{ github.event.inputs.package_name }}" \
            --name "${{ github.event.inputs.app_name }}" \
            -o mod.apk
      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: Mod-APK
          path: mod*.apk
          retention-days: 7
