name: Build MOD APK

on:
  workflow_dispatch:
    inputs:
      package_name:
        default: 'com.jaiho.mod'
      app_name:
        default: 'Jaiho Pro'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: python3 --version
